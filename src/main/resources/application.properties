spring.application.name=vortexos

# PostgreSQL — env-driven so it works locally (defaults below) and in Docker (compose sets env).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vortexos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vortex}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vortex}
spring.datasource.driver-class-name=org.postgresql.Driver
# Dialect is auto-detected from the driver. ddl-auto=update lets Hibernate manage the schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8082

# Messenger file transfer — large files are streamed to a disk store (not the DB).
# Cap at 1 GB; spill multipart to disk early so a big upload never buffers in memory.
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB
spring.servlet.multipart.file-size-threshold=1MB
server.tomcat.max-swallow-size=-1
# Where transfer bytes live. In Docker this is a mounted volume (see docker-compose.yml).
vortex.transfer.dir=${VORTEX_TRANSFER_DIR:${java.io.tmpdir}/vortex-transfers}

# JWT — HMAC-SHA256 secret (base64, >= 256 bits) and token lifetime in ms (24h).
# Override via the JWT_SECRET env var in any real deployment.
jwt.secret=${JWT_SECRET:Vm9ydGV4T1NkZXZzZWNyZXRfY2hhbmdlX21lX2luX3Byb2R1Y3Rpb25fMDEyMzQ1Njc4OQ==}
jwt.expiration=86400000
