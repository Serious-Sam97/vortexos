spring.application.name=vortexos

spring.datasource.url=jdbc:sqlite:vortexos.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8082

# JWT — HMAC-SHA256 secret (base64, >= 256 bits) and token lifetime in ms (24h).
# Override via the JWT_SECRET env var in any real deployment.
jwt.secret=${JWT_SECRET:Vm9ydGV4T1NkZXZzZWNyZXRfY2hhbmdlX21lX2luX3Byb2R1Y3Rpb25fMDEyMzQ1Njc4OQ==}
jwt.expiration=86400000