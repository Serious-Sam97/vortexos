spring.application.name=vortexos

# Isolated in-memory SQLite for tests. Pool size 1 keeps the single connection alive
# so the shared-cache :memory: database persists for the lifetime of each test context.
spring.datasource.url=jdbc:sqlite:file::memory:?cache=shared
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
